<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1500" role="img" aria-label="Wedding ring filler image">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f4ead8"/>
      <stop offset="1" stop-color="#d9c1a1"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="45%">
      <stop offset="0" stop-color="#fff6e5" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#fff6e5" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>
  <rect width="1200" height="1500" fill="url(#bg)"/>
  <ellipse cx="340" cy="1180" rx="380" ry="180" fill="#7b3b2f" opacity="0.10" filter="url(#soft)"/>
  <ellipse cx="900" cy="260" rx="280" ry="120" fill="#2f4a3a" opacity="0.10" filter="url(#soft)"/>
  <rect x="110" y="240" width="980" height="1040" rx="28" fill="#f8f1e8" opacity="0.75"/>
  <circle cx="550" cy="790" r="180" fill="none" stroke="#c8a25a" stroke-width="34"/>
  <circle cx="700" cy="720" r="160" fill="none" stroke="#b7904b" stroke-width="34"/>
  <circle cx="760" cy="615" r="16" fill="#f7efd9"/>
  <circle cx="760" cy="615" r="9" fill="#e8d6b4"/>
  <ellipse cx="610" cy="1000" rx="300" ry="90" fill="#2a2018" opacity="0.12"/>
  <rect width="1200" height="1500" fill="url(#glow)"/>
